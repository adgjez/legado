name: Android Fast Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-abi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Release Apk Sign
        run: |
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS='${{ secrets.CI_DEBUG_KEY_ALIAS }}' >> gradle.properties
          echo RELEASE_KEY_PASSWORD='${{ secrets.CI_DEBUG_KEY_PASSWORD }}' >> gradle.properties
          echo RELEASE_STORE_PASSWORD='${{ secrets.CI_DEBUG_STORE_PASSWORD }}' >> gradle.properties
          echo RELEASE_STORE_FILE='./key.jks' >> gradle.properties
          echo ${{ secrets.CI_DEBUG_KEY_STORE_B64 }} | base64 --decode > $GITHUB_WORKSPACE/app/key.jks

      - name: Prepare release version
        id: version
        run: |
          VERSION_NAME="3.$(TZ=Asia/Shanghai date +%y.%m%d%H%M)"
          VERSION_CODE=$(($(date -u +%s) / 60))
          TAG_NAME="archive-v3-${VERSION_NAME}"
          {
            echo "name=${VERSION_NAME}"
            echo "code=${VERSION_CODE}"
            echo "tag=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<'EOF'
          阅读Archive 第九版补充更新

          新增：
          - 新增标准世界书功能，支持世界书管理、导入、匹配注入、角色绑定，以及在 AI 对话和阅读页中快速启用。
          - 新增 AI 角色助手侧栏，支持默认助手、角色助手、按助手隔离会话、角色卡展示和会话历史管理。
          - 新增 AI 聊天语音播放能力，支持调用角色绑定的 HTTP TTS 发言人进行播放。
          - 新增 AI 工具能力，支持角色正文检索、书籍关键词搜索和世界书编辑管理。
          - 新增 Agent 规划、工具校验、失败重试和任务检查点能力，提升复杂工具调用的稳定性。

          修复：
          - 修复 AI 聊天头像资源在部分场景下可能导致崩溃的问题。
          - 修复阅读页刷新目录时影响已缓存正文阅读的问题，目录刷新改为静默执行。
          - 修复正文替换净化、移除规则和缩进等设置修改后不能实时生效的问题。
          - 修复多角色自动建卡部分场景下没有创建角色卡的问题。
          - 修复多角色工具返回新角色后未正确校验和补全的问题。
          - 修复部分多角色 TTS 路由失败时频繁弹出报错的问题。
          - 修复情景演绎气泡在部分设备上可能出现异常高亮和按压残留的问题。
          EOF

      - name: Build arm64 release APK
        run: |
          rm -rf release-apks app/build/outputs/apk/app/release
          mkdir -p release-apks
          ./gradlew :app:clean :app:assembleAppRelease \
            -Pabi=arm64-v8a \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            --stacktrace
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          cp "$APK_PATH" "release-apks/legado-arm64-v8a_app_${{ steps.version.outputs.name }}_${{ steps.version.outputs.code }}.apk"

      - name: Build armeabi-v7a release APK
        run: |
          rm -rf app/build/outputs/apk/app/release
          ./gradlew :app:clean :app:assembleAppRelease \
            -Pabi=armeabi-v7a \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            --stacktrace
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          cp "$APK_PATH" "release-apks/legado-armeabi-v7a_app_${{ steps.version.outputs.name }}_${{ steps.version.outputs.code }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-release-abi
          path: release-apks/*.apk

      - name: Clear existing versioned release APKs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }} --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r ASSET_ID; do
                  gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
                done
          fi

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 阅读Archive 第九版补充更新 ${{ steps.version.outputs.name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: release-apks/*.apk
          body_path: release-notes.md

      - name: Refresh app update channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL_TAG="latest-arm64-release"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$CHANNEL_TAG --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r ASSET_ID; do
                  gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
                done
            gh release upload "$CHANNEL_TAG" release-apks/*.apk --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          else
            gh release create "$CHANNEL_TAG" release-apks/*.apk \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          fi

      - name: Sync release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN is not configured, skip Gitee release sync."
            exit 0
          fi

          set +e
          API="https://gitee.com/api/v5/repos/zziji/legado"
          TAG_NAME="${{ steps.version.outputs.tag }}"
          RELEASE_NAME="阅读Archive 第九版补充更新 ${{ steps.version.outputs.name }}"
          CHANNEL_TAG="latest-arm64-release"
          TOKEN_QUERY="$(python3 -c 'import os, urllib.parse; print(urllib.parse.urlencode({"access_token": os.environ["GITEE_TOKEN"]}))')"

          if ! git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            git fetch origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
          fi

          GITEE_REMOTE="https://oauth2:${GITEE_TOKEN}@gitee.com/zziji/legado.git"
          if git ls-remote --exit-code --tags "$GITEE_REMOTE" "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Gitee tag already exists: $TAG_NAME"
          else
            git push "$GITEE_REMOTE" "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
            echo "Pushed Gitee tag: $TAG_NAME"
          fi

          find_release_id() {
            curl -fsS -G \
              --data-urlencode "access_token=$GITEE_TOKEN" \
              "$API/releases/tags/$1" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id", ""))'
          }

          upsert_release() {
            local tag_name="$1"
            local release_name="$2"
            local release_id
            release_id="$(find_release_id "$tag_name" 2>/dev/null || true)"
            if [ -n "$release_id" ]; then
              curl -fsS -X PATCH "$API/releases/$release_id" \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "tag_name=$tag_name" \
                --data-urlencode "name=$release_name" \
                --data-urlencode "body=$(cat release-notes.md)" \
                --data-urlencode "prerelease=false" >/dev/null
            else
              release_id="$(curl -fsS -X POST "$API/releases" \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "tag_name=$tag_name" \
                --data-urlencode "target_commitish=$tag_name" \
                --data-urlencode "name=$release_name" \
                --data-urlencode "body=$(cat release-notes.md)" \
                --data-urlencode "prerelease=false" \
                | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id", ""))')"
            fi
            echo "$release_id"
          }

          upload_apks() {
            local release_id="$1"
            if [ -z "$release_id" ]; then
              return 1
            fi
            curl -fsS -G \
              --data-urlencode "access_token=$GITEE_TOKEN" \
              "$API/releases/$release_id/attach_files" \
              | python3 -c 'import json,sys; data=json.load(sys.stdin); [print(item.get("id")) for item in data if str(item.get("name", "")).endswith(".apk")]' \
              | while read -r attach_id; do
                  if [ -n "$attach_id" ]; then
                    curl -fsS -X DELETE "$API/releases/$release_id/attach_files/$attach_id?$TOKEN_QUERY" >/dev/null
                  fi
                done
            for apk in release-apks/*.apk; do
              curl -fsS -X POST "$API/releases/$release_id/attach_files" \
                -F "access_token=$GITEE_TOKEN" \
                -F "file=@$apk" >/dev/null || return 1
            done
          }

          SYNC_FAILED=0
          VERSIONED_ID="$(upsert_release "$TAG_NAME" "$RELEASE_NAME")" || SYNC_FAILED=1
          upload_apks "$VERSIONED_ID" || SYNC_FAILED=1

          if git ls-remote --exit-code --tags "$GITEE_REMOTE" "refs/tags/$CHANNEL_TAG" >/dev/null 2>&1; then
            echo "Gitee update channel tag already exists: $CHANNEL_TAG"
          else
            git push "$GITEE_REMOTE" "HEAD:refs/tags/$CHANNEL_TAG"
            echo "Pushed Gitee update channel tag: $CHANNEL_TAG"
          fi

          CHANNEL_ID="$(upsert_release "$CHANNEL_TAG" "阅读Archive 更新通道")" || SYNC_FAILED=1
          upload_apks "$CHANNEL_ID" || SYNC_FAILED=1

          if [ "$SYNC_FAILED" -ne 0 ]; then
            echo "Gitee release sync failed, GitHub release has already been published."
            exit 0
          fi
          echo "Gitee release sync finished."
