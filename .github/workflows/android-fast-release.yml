name: Android Fast Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Prepare release version
        id: version
        run: |
          VERSION_NAME="3.$(TZ=Asia/Shanghai date +%y.%m%d%H)"
          VERSION_CODE=$(($(date -u +%s) / 60))
          TAG_NAME="archive-v3-${VERSION_NAME}"
          {
            echo "name=${VERSION_NAME}"
            echo "code=${VERSION_CODE}"
            echo "tag=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          阅读Archive 第三版

          五一快乐，祝大家假期阅读愉快！

          - 优化书籍详情页信息栏、简介和目录区域的滚动体验。
          - 重整设置页结构，发现页、订阅源和 AI 设置入口更清晰。
          - 增强 AI 原生工具管理，支持设置、书架、阅读、书源和联网搜索工具开关。
          - 完善正文问 AI 的历史、中文工具名和回复弹窗样式。
          - 修复发现页 showBrowser、java.open 和 preJs 注入兼容，内嵌 WebView 支持深色与透明背景。
          - 新版发现页增加 select 筛选栏和“其他”分组兜底，减少标签丢失。
          - 优化 useweb 简介滚动和透明背景显示。
          EOF

      - name: Build full release APK
        run: |
          ./gradlew :app:assembleAppRelease \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            -PRELEASE_STORE_FILE=ci-debug.keystore \
            -PRELEASE_STORE_PASSWORD=legado-ci-debug \
            -PRELEASE_KEY_ALIAS=legado-ci-debug \
            -PRELEASE_KEY_PASSWORD=legado-ci-debug \
            --stacktrace

      - name: Resolve APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-release-full
          path: ${{ steps.apk.outputs.path }}

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 阅读Archive 第三版 ${{ steps.version.outputs.name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: ${{ steps.apk.outputs.path }}
          body_path: release-notes.md

      - name: Refresh app update channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL_TAG="latest-arm64-release"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$CHANNEL_TAG --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r ASSET_ID; do
                  gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
                done
            gh release upload "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          else
            gh release create "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          fi
