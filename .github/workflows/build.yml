name: Build APK

on:
  push:
    branches: [main, feature/arcreel-integration]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew :app:assembleAppDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: legado-debug
          path: app/build/outputs/apk/app/debug/*.apk