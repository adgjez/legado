name: Private Armv8 Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-armv8-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Restore incremental build cache
        id: incremental-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .gradle
            .kotlin
            build
            app/build
            modules/book/build
            modules/rhino/build
          key: android-incremental-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            android-incremental-${{ runner.os }}-${{ github.ref_name }}-
            android-incremental-${{ runner.os }}-

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Configure release signing
        run: |
          {
            echo
            echo "RELEASE_KEY_ALIAS=${{ secrets.CI_DEBUG_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.CI_DEBUG_KEY_PASSWORD }}"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.CI_DEBUG_STORE_PASSWORD }}"
            echo "RELEASE_STORE_FILE=./key.jks"
          } >> gradle.properties
          echo "${{ secrets.CI_DEBUG_KEY_STORE_B64 }}" | base64 --decode > "$GITHUB_WORKSPACE/app/key.jks"

      - name: Prepare release version
        id: version
        run: |
          VERSION_NAME="3.$(TZ=Asia/Shanghai date +%y.%m%d%H%M)"
          VERSION_CODE=$(($(date -u +%s) / 60))
          TAG_NAME="private-armv8-${VERSION_NAME}"
          {
            echo "name=${VERSION_NAME}"
            echo "code=${VERSION_CODE}"
            echo "tag=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<'EOF'
          Private arm64-v8a release build.

          This workflow builds only the armv8/arm64-v8a release APK from the private repository.
          EOF

      - name: Build arm64-v8a release APK
        run: |
          rm -rf release-apks app/build/outputs/apk/app/release
          mkdir -p release-apks
          ./gradlew :app:assembleAppRelease \
            -Pabi=arm64-v8a \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            --build-cache \
            --stacktrace
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          test -n "$APK_PATH"
          cp "$APK_PATH" "release-apks/legado-arm64-v8a_app_${{ steps.version.outputs.name }}_${{ steps.version.outputs.code }}.apk"

      - name: Save incremental build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .gradle
            .kotlin
            build
            app/build
            modules/book/build
            modules/rhino/build
          key: android-incremental-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-arm64-v8a-release
          path: release-apks/*.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Legado private arm64-v8a ${{ steps.version.outputs.name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: release-apks/*.apk
          body_path: release-notes.md
