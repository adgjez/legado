name: AI Video P1 Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: "debug"
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install AAPT2 runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-i386 lib32stdc++6 lib32z1 libncurses6 libtinfo6

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Sanitize Gradle AAPT2 caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          rm -rf ~/.gradle/caches/*/transforms
          rm -rf ~/.gradle/caches/*/transforms-*
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/aapt2

      - name: Build ${{ inputs.build_type }} APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-XX:+UseParallelGC\ -Xmx4g\ -Xms256m\ -XX:MaxMetaspaceSize=768m\ -Dfile.encoding=UTF-8
            -Dorg.gradle.workers.max=2
        run: |
          VERSION_CODE=$(($(date -u +%s) / 60))
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleAppRelease \
              -Pabi=arm64-v8a \
              -PVERSION_CODE="$VERSION_CODE" \
              -PRELEASE_STORE_FILE=ci-debug.keystore \
              -PRELEASE_STORE_PASSWORD=legado-ci-debug \
              -PRELEASE_KEY_ALIAS=legado-ci-debug \
              -PRELEASE_KEY_PASSWORD=legado-ci-debug \
              --no-daemon \
              --max-workers=2 \
              --stacktrace
          else
            ./gradlew :app:assembleAppDebug \
              -Pabi=arm64-v8a \
              -PVERSION_CODE="$VERSION_CODE" \
              -PRELEASE_STORE_FILE=ci-debug.keystore \
              -PRELEASE_STORE_PASSWORD=legado-ci-debug \
              -PRELEASE_KEY_ALIAS=legado-ci-debug \
              -PRELEASE_KEY_PASSWORD=legado-ci-debug \
              --no-daemon \
              --max-workers=2 \
              --stacktrace
          fi

      - name: List APK output
        if: always()
        run: |
          echo "== APK output dir =="
          ls -lah app/build/outputs/apk/ 2>/dev/null || true
          echo "== APKs =="
          find app/build/outputs -type f -name '*.apk' 2>/dev/null || echo "no apk found"

      - name: Upload generated Room schema (debug)
        if: success()
        run: |
          mkdir -p /tmp/room-schemas
          find app/build/generated/ksp -path '*schemas/io.legado.app.data.AppDatabase*' -name '*.json' -print -exec cp {} /tmp/room-schemas/ \; 2>/dev/null || true
          cp -v app/schemas/io.legado.app.data.AppDatabase/100.json /tmp/room-schemas/ 2>/dev/null || echo "no 100.json in git"
          echo "--- collected ---"
          ls -la /tmp/room-schemas/ || true
        continue-on-error: true

      - name: Upload Room schema artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: /tmp/room-schemas/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}-arm64
          path: |
            app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 14
