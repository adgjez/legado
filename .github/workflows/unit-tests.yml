name: Unit Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/unit-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/unit-tests.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install AAPT2 runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-i386 lib32stdc++6 lib32z1 libncurses6 libtinfo6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run unit tests
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-XX:+UseParallelGC -Xmx4g -Xms256m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
            -Dorg.gradle.workers.max=2
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
        run: |
          ./gradlew :app:testDebugUnitTest \
            --no-daemon \
            --max-workers=2 \
            --stacktrace \
            --continue

      - name: Generate test summary
        if: always()
        run: |
          mkdir -p test-summary
          {
            echo "# 单元测试结果"
            echo ""
            echo "- 触发: ${{ github.event_name }}"
            echo "- 分支: ${{ github.ref_name }}"
            echo "- 提交: ${{ github.sha }}"
            echo ""
            echo "## 测试报告"
            echo ""
            echo "详见 [Test Report artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > test-summary/summary.md

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
            test-summary/
          retention-days: 14

      - name: Publish test report to PR check
        if: always() && github.event_name == 'pull_request'
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: app/build/test-results/testDebugUnitTest/*.xml
          check_name: "Unit Test Results"
          detailed_summary: true
          include_passed: true
