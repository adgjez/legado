<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f7f3ea;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script src="jszip.min.js"></script>
  <script src="epub.min.js"></script>
</head>
<body>
  <div id="viewer"></div>
  <script>
    let book = null;
    let rendition = null;
    let tocItems = [];
    let activeChapterIndex = 0;
    let pendingRestoreScroll = 0;
    let reportTimer = 0;
    let pageAnim = 3;
    let currentStyle = {};
    let animating = false;

    function notify(type, payload) {
      if (window.AndroidBridge && AndroidBridge.onEvent) {
        AndroidBridge.onEvent(type, JSON.stringify(payload || {}));
      }
    }

    function applyTheme() {
      if (!rendition || !window.AndroidBridge) return;
      const style = JSON.parse(AndroidBridge.getStyle());
      currentStyle = style;
      document.body.style.background = style.background || "#f7f3ea";
      rendition.themes.default({
        "html": {
          "background": style.background || "#f7f3ea"
        },
        "body": {
          "background": style.background || "#f7f3ea",
          "color": style.color || "#2f2a24",
          "line-height": style.lineHeight || "1.55",
          "font-size": style.fontSize || "100%",
          "font-family": style.fontFamily || "sans-serif",
          "letter-spacing": style.letterSpacing || "normal",
          "padding": style.padding || "0 16px",
          "box-sizing": "border-box"
        },
        "p": {
          "margin-top": "0",
          "margin-bottom": style.paragraphSpacing || "0.8em"
        },
        "img": {
          "max-width": "100%",
          "height": "auto",
          "object-fit": "contain"
        },
        "svg": {
          "max-width": "100%",
          "height": "auto"
        },
        "body > div:only-child svg:only-child": {
          "display": "block",
          "width": "100%",
          "height": "auto"
        }
      });
    }

    function injectContentStyles(contents) {
      const css = `
        html, body {
          background: transparent !important;
          height: auto !important;
          min-height: 100% !important;
          overflow-x: hidden !important;
          overflow-y: auto !important;
        }
        body {
          box-sizing: border-box !important;
        }
        img, svg, image {
          max-width: 100% !important;
          object-fit: contain !important;
          break-inside: avoid !important;
          page-break-inside: avoid !important;
        }
        img {
          height: auto !important;
          max-height: none !important;
        }
        svg {
          height: auto !important;
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child,
        body > p:only-child,
        body > figure:only-child {
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child svg:only-child,
        body > div:only-child img:only-child,
        body > p:only-child img:only-child,
        body > figure:only-child img:only-child {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          max-height: none !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        [style*="height: 100%"], [style*="height:100%"] {
          height: auto !important;
          max-height: none !important;
        }
      `;
      try {
        contents.addStylesheetRules({ "body": { "background": "transparent !important" } });
        contents.addStylesheet("data:text/css;charset=utf-8," + encodeURIComponent(css));
      } catch (e) {
        const doc = contents.document;
        if (doc && doc.head) {
          const style = doc.createElement("style");
          style.textContent = css;
          doc.head.appendChild(style);
        }
      }
      bindScrollReporter(contents);
    }

    function bindScrollReporter(contents) {
      const win = contents.window;
      if (!win) return;
      win.removeEventListener("scroll", scheduleLocationReport);
      win.addEventListener("scroll", scheduleLocationReport, { passive: true });
      const outer = getOuterScroller();
      if (outer) {
        outer.removeEventListener("scroll", scheduleLocationReport);
        outer.addEventListener("scroll", scheduleLocationReport, { passive: true });
      }
    }

    function scheduleLocationReport() {
      clearTimeout(reportTimer);
      reportTimer = setTimeout(reportLocation, 120);
    }

    function flattenToc(items, out) {
      (items || []).forEach(item => {
        if (item && item.href) {
          out.push({
            href: item.href,
            label: item.label || item.href
          });
        }
        if (item && item.subitems && item.subitems.length) {
          flattenToc(item.subitems, out);
        }
      });
      return out;
    }

    function sameHref(a, b) {
      if (!a || !b) return false;
      const left = String(a).split("#")[0];
      const right = String(b).split("#")[0];
      return left === right || left.endsWith(right) || right.endsWith(left);
    }

    function updateActiveChapter(href) {
      const index = tocItems.findIndex(item => sameHref(href, item.href));
      if (index >= 0) {
        activeChapterIndex = index;
      }
      return activeChapterIndex;
    }

    function getActiveContents() {
      if (!rendition || !rendition.getContents) return null;
      const contents = rendition.getContents();
      return contents && contents.length ? contents[0] : null;
    }

    function getOuterScroller() {
      return document.querySelector(".epub-container") || document.getElementById("viewer");
    }

    function getScrollPort() {
      const contents = getActiveContents();
      const win = contents && contents.window;
      const doc = contents && contents.document;
      if (win && doc) {
        const root = doc.scrollingElement || doc.documentElement || doc.body;
        const height = Math.max(
          root.scrollHeight || 0,
          doc.body ? doc.body.scrollHeight : 0
        );
        const viewHeight = win.innerHeight || root.clientHeight || 0;
        const max = Math.max(0, height - viewHeight);
        if (max > 8) {
          return {
            top: win.scrollY || root.scrollTop || 0,
            max,
            height: viewHeight,
            scrollTo: y => win.scrollTo(0, y)
          };
        }
      }
      const outer = getOuterScroller();
      if (!outer) {
        return { top: 0, max: 0, height: 0, scrollTo: () => {} };
      }
      const viewHeight = outer.clientHeight || window.innerHeight || 0;
      return {
        top: outer.scrollTop || 0,
        max: Math.max(0, (outer.scrollHeight || 0) - viewHeight),
        height: viewHeight,
        scrollTo: y => {
          outer.scrollTop = y;
        }
      };
    }

    function reportLocation() {
      const metrics = getScrollPort();
      notify("location", {
        cfi: "",
        chapterIndex: activeChapterIndex,
        scrollTop: Math.round(metrics.top),
        scrollMax: Math.round(metrics.max)
      });
    }

    function createRendition() {
      pageAnim = AndroidBridge.getPageAnim ? AndroidBridge.getPageAnim() : 3;
      rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: "scrolled-doc",
        manager: "default",
        spread: "none"
      });
      applyTheme();
      rendition.hooks.content.register(injectContentStyles);
      rendition.on("rendered", section => {
        const chapterIndex = updateActiveChapter(section.href);
        notify("chapter", { href: section.href, title: section.label || "", chapterIndex });
        setTimeout(() => {
          if (pendingRestoreScroll > 0) {
            getScrollPort().scrollTo(pendingRestoreScroll);
            pendingRestoreScroll = 0;
          } else {
            getScrollPort().scrollTo(0);
          }
          reportLocation();
        }, 120);
      });
    }

    async function openBook() {
      try {
        if (!window.JSZip) {
          throw new Error("JSZip lib not loaded");
        }
        if (!window.ePub) {
          throw new Error("epub.js lib not loaded");
        }
        const bookUrl = AndroidBridge.getBookUrl();
        if (!bookUrl) {
          throw new Error("EPUB OPF url is empty");
        }
        book = ePub(bookUrl);
        createRendition();
        await book.ready;
        tocItems = flattenToc((book.navigation && book.navigation.toc) || [], []);
        notify("toc", {
          toc: (book.navigation && book.navigation.toc) || []
        });
        const savedIndex = AndroidBridge.getSavedChapterIndex ? AndroidBridge.getSavedChapterIndex() : 0;
        pendingRestoreScroll = AndroidBridge.getSavedScrollTop ? AndroidBridge.getSavedScrollTop() : 0;
        const savedHref = tocItems[savedIndex] && tocItems[savedIndex].href;
        await rendition.display(savedHref || undefined);
        notify("ready", {});
      } catch (e) {
        notify("error", { message: String(e && e.message ? e.message : e) });
      }
    }

    function scrollPage(direction) {
      if (animating) return;
      const metrics = getScrollPort();
      const step = Math.max(160, Math.floor(metrics.height * 0.86));
      if (direction > 0) {
        if (metrics.top >= metrics.max - 8) {
          notify("pageBoundary", { direction: 1 });
        } else {
          animateScroll(direction, metrics, Math.min(metrics.max, metrics.top + step));
        }
      } else if (direction < 0) {
        if (metrics.top <= 8) {
          notify("pageBoundary", { direction: -1 });
        } else {
          animateScroll(direction, metrics, Math.max(0, metrics.top - step));
        }
      }
    }

    function animateScroll(direction, metrics, targetTop) {
      const mode = Number(pageAnim);
      if (mode === 4) {
        metrics.scrollTo(targetTop);
        setTimeout(reportLocation, 40);
        return;
      }
      if (mode === 3) {
        animateNativeScroll(metrics, targetTop, 260);
        return;
      }
      if (mode === 0) {
        animateCover(direction, metrics, targetTop);
        return;
      }
      if (mode === 1) {
        animateSlide(direction, metrics, targetTop);
        return;
      }
      if (mode === 2) {
        animateSimulation(direction, metrics, targetTop);
        return;
      }
      metrics.scrollTo(targetTop);
      setTimeout(reportLocation, 40);
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateNativeScroll(metrics, targetTop, duration) {
      animating = true;
      const startTop = metrics.top;
      const delta = targetTop - startTop;
      const start = performance.now();
      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        metrics.scrollTo(startTop + delta * easeOutCubic(t));
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          animating = false;
          reportLocation();
        }
      }
      requestAnimationFrame(frame);
    }

    function animateSlide(direction, metrics, targetTop) {
      const viewer = document.getElementById("viewer");
      animating = true;
      viewer.style.transition = "transform 180ms ease-out";
      viewer.style.transform = `translateY(${-direction * 18}px)`;
      setTimeout(() => {
        metrics.scrollTo(targetTop);
        viewer.style.transition = "transform 150ms ease-out";
        viewer.style.transform = "translateY(0)";
        setTimeout(() => {
          viewer.style.transition = "";
          animating = false;
          reportLocation();
        }, 170);
      }, 120);
    }

    function animateCover(direction, metrics, targetTop) {
      const overlay = createAnimOverlay();
      const from = direction > 0 ? "100%" : "-100%";
      const to = "0";
      animating = true;
      overlay.style.transform = `translateY(${from})`;
      requestAnimationFrame(() => {
        overlay.style.transition = "transform 180ms ease-out";
        overlay.style.transform = `translateY(${to})`;
      });
      setTimeout(() => {
        metrics.scrollTo(targetTop);
        overlay.style.transition = "transform 180ms ease-in";
        overlay.style.transform = `translateY(${-direction * 100}%)`;
        setTimeout(() => {
          overlay.remove();
          animating = false;
          reportLocation();
        }, 190);
      }, 190);
    }

    function animateSimulation(direction, metrics, targetTop) {
      const viewer = document.getElementById("viewer");
      animating = true;
      viewer.style.transformOrigin = direction > 0 ? "center bottom" : "center top";
      viewer.style.transition = "transform 150ms ease-out, opacity 150ms ease-out";
      viewer.style.transform = `perspective(900px) rotateX(${direction * 4}deg) scale(0.985)`;
      viewer.style.opacity = "0.92";
      setTimeout(() => {
        metrics.scrollTo(targetTop);
        viewer.style.transition = "transform 180ms ease-out, opacity 180ms ease-out";
        viewer.style.transform = "none";
        viewer.style.opacity = "1";
        setTimeout(() => {
          viewer.style.transition = "";
          viewer.style.transformOrigin = "";
          animating = false;
          reportLocation();
        }, 190);
      }, 130);
    }

    function createAnimOverlay() {
      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.left = "0";
      overlay.style.top = "0";
      overlay.style.right = "0";
      overlay.style.bottom = "0";
      overlay.style.zIndex = "20";
      overlay.style.pointerEvents = "none";
      overlay.style.background = currentStyle.background || "#f7f3ea";
      overlay.style.boxShadow = "0 -18px 36px rgba(0,0,0,0.12)";
      document.body.appendChild(overlay);
      return overlay;
    }

    function display(cfiOrHref) {
      if (!rendition || !cfiOrHref) return;
      pendingRestoreScroll = 0;
      rendition.display(cfiOrHref);
    }

    function setStyle() {
      applyTheme();
    }

    function setScrollMode() {
      setStyle();
    }

    function setPageAnim(value) {
      pageAnim = Number(value);
    }

    document.addEventListener("DOMContentLoaded", openBook);
  </script>
</body>
</html>
